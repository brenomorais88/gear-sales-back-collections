$kind: http-request
name: DELETE /categorias/:id (Delete)
url: "{{baseUrl}}/categorias/{{categoryId}}"
method: DELETE
scripts:
  - type: afterResponse
    code: >-
      pm.test('204/200', function(){
      pm.expect([200,204]).to.include(pm.response.code); });

      pm.environment.unset('categoryId');
    language: text/javascript
order: 5000
