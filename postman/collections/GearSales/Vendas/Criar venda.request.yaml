$kind: http-request
url: "{{baseUrl}}/vendas"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "idAnuncio": "{{anuncioId}}",
      "idVendedor": "{{userId}}",
      "valorBruto": "75000.00",
      "comissao": "5000.00",
      "dataVenda": "2026-01-26T14:30:00"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
        const json = pm.response.json();
        pm.environment.set('saleId', json.id);
      }
    language: text/javascript
order: 4000
