$kind: http-request
url: "{{baseUrl}}/anuncios"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "valorCompra": "35000.00",
      "valorVenda": "39990.00",
      "status": "DISPONIVEL",
      "veiculoId": "{{vehicleId}}",
      "lojaId": "{{lojaId}}"
    }
order: 1000
