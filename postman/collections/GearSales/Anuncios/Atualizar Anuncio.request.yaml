$kind: http-request
url: "{{baseUrl}}/anuncios/{{anuncioId}}"
method: PUT
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "valorCompra": 36000.00,
      "valorVenda": 40990.00,
      "status": "RESERVADO",
      "veiculoId": "{{vehicleId}}",
      "lojaId": "{{lojaId}}"
    }
order: 5000
