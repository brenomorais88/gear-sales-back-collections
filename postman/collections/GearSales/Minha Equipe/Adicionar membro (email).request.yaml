$kind: http-request
description: Adiciona um membro usando o email.
url: "{{baseUrl}}/lojas/{{lojaId}}/equipe"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "usuario@email.com",
      "documento": null,
      "role": "VENDEDOR"
    }
order: 2000
