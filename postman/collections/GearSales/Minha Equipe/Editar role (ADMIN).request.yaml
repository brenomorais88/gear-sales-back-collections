$kind: http-request
description: Edita o role de um membro da equipe.
url: "{{baseUrl}}/lojas/{{lojaId}}/equipe/{{teamMemberId}}/role"
method: PATCH
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "role": "MANAGER"
    }
order: 4000
