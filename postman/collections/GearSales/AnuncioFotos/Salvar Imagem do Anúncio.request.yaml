  Authorization: Bearer {{accessToken}}
body:
  type: text
  content: >
    {
      "url": "{{cloudflare_finalUrl}}",
      "veiculoId": "{{vehicleId}}",
      "ordem": 0,
      "isCapa": true
    }
order: 3000
